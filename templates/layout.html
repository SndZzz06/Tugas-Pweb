{{ define "layout" }}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ template "title" . }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="sidebar">
    <h3><i class="fa-solid fa-folder-open"></i> NextState</h3>
    <br>
    {{ if .User }}
    <div class="user-profile">
      <div class="avatar-sm">{{ avatar .User.Name }}</div>
      <div class="user-info">
        <span class="user-name">{{ .User.Name }}</span>
        <span class="user-role">{{ .User.Role }}</span>
      </div>
    </div>
    {{ end }}
    <br>
    <a href="/" class="nav-item {{ if eq .ActivePage "dashboard" }}active{{ end }}"><i class="fa-solid fa-grip"></i> Dashboard</a>
    <a href="/team" class="nav-item {{ if eq .ActivePage "team" }}active{{ end }}"><i class="fa-solid fa-users"></i> Team</a>
    
    <div class="sidebar-footer">
      <form action="/logout" method="POST">
        <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
        <button type="submit" class="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </form>
    </div>
  </div>

  <div class="content {{ if .MainContentFull }}main-content-full{{ end }}">
    {{ template "content" . }}
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
{{ end }}
